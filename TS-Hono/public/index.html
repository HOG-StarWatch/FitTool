<!DOCTYPE html>
<html lang="zh_CN">
<head>
  <meta charset="UTF-8" />
  <title>Keep 校园跑</title>
  <link rel="icon" type="image/png" href="./HOG_S_64.png">
  <link rel="shortcut icon" type="image/png" href="./HOG_S_64.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="app">
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="logo-container">
            <img src="./HOG_S_64.png" alt="Logo" class="logo-icon" id="logoIcon" style="cursor: pointer;">
          </div>
          <h1>Keep 校园跑</h1>
          <div class="theme-selector">
            <button class="theme-selector-btn" data-theme="light" title="浅色主题"></button>
            <button class="theme-selector-btn" data-theme="dark" title="深紫暗黑"></button>
            <button class="theme-selector-btn" data-theme="glass" title="紫色玻璃"></button>
          </div>
          <div id="serviceStatus" class="service-status" title="点击刷新服务状态">
            <span class="status-dot"></span>
            <span class="status-text">检测中</span>
          </div>
        </div>

      <div class="card collapsible">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-icon">🗺️</span>
          <span>地图设置</span>
          <span class="collapse-icon">▼</span>
        </div>
        <div class="card-body">
          <select id="mapSourceSelect" class="styled-select">
            <optgroup label="国内免费无鉴权">
              <option value="gaode_vec" selected>高德地图 矢量</option>
              <option value="gaode_img">高德地图 影像</option>
              <option value="gaode_rel">高德地图 路网</option>
              <option value="tencent_vec">腾讯地图 矢量</option>
              <option value="tencent_sat">腾讯地图 影像</option>
              <option value="baidu_vec">百度地图 矢量</option>
              <option value="baidu_img">百度地图 影像</option>
              <option value="osm_cn">OSM 国内节点</option>
            </optgroup>
            <optgroup label="国际免费无鉴权">
              <option value="arcgis_street">ArcGIS 街道图</option>
              <option value="arcgis_satellite">ArcGIS 卫星图</option>
              <option value="cartodb">CartoDB 浅色</option>
              <option value="cartodb_dark">CartoDB 深色</option>
              <option value="osmde">OSM 德国节点</option>
              <option value="osmfr">OSM 法国节点</option>
              <option value="cyclOSM">CyclOSM 骑行图</option>
              <option value="wikimedia">Wikimedia</option>
              <option value="stamen_water">Stamen 水彩</option>
              <option value="stamen_terrain">Stamen 地形</option>
            </optgroup>
            <optgroup label="需 Key">
              <option value="tianditu">天地图 矢量</option>
              <option value="satellite">天地图 卫星</option>
            </optgroup>
          </select>
          <div id="tiandituKeyContainer" class="tianditu-key-box">
            <input type="text" id="tiandituKeyInput" placeholder="天地图 Key" value="fc97d01c0e3e98289295da844e1f2dad">
            <a href="https://www.bilibili.com/video/BV1FhVhz6EEh/" target="_blank" class="key-link">申请教程</a>
          </div>
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索位置..." onkeypress="if(event.keyCode===13)searchLocation()">
            <button class="btn-icon" onclick="searchLocation()">🔍</button>
          </div>
          <div id="searchResult" class="search-result"></div>
          <button id="getLocationBtn" class="btn-location">📍 获取位置</button>
        </div>
      </div>

      <div class="card collapsible">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-icon">✏️</span>
          <span>绘制工具</span>
          <span class="collapse-icon">▼</span>
        </div>
        <div class="card-body">
          <div class="mode-switch">
            <button id="freeDrawMode" class="mode-btn active">自由绘制</button>
            <button id="shapeDrawMode" class="mode-btn">形状生成</button>
            <button id="editModeBtn" class="mode-btn">编辑</button>
          </div>
          
          <div id="shapeGenerationPanel" class="shape-panel" style="display: none;">
            <div class="form-row">
              <select id="shapeType" class="styled-select">
                <option value="400m">标准跑道 400m</option>
                <option value="300m">中型跑道 300m</option>
                <option value="200m">小型跑道 200m</option>
              </select>
            </div>
            <div class="slider-control">
              <label>旋转角度</label>
              <div class="slider-row">
                <input type="range" id="rotationSlider" min="0" max="360" value="0">
                <input type="number" id="rotationInput" min="0" max="360" value="0">
                <span>°</span>
              </div>
            </div>
            <div class="slider-control">
              <label>纬度偏移 / 经度偏移 (度)</label>
              <div class="slider-row offset-row">
                <input type="number" id="offsetLatInput" value="0" step="0.0001" placeholder="纬度">
                <input type="number" id="offsetLngInput" value="0" step="0.0001" placeholder="经度">
              </div>
            </div>
            <button id="generateShapeBtn" class="btn-primary">在地图中心生成</button>
          </div>
        </div>
      </div>

      <div class="card collapsible">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-icon">📍</span>
          <span>当前路线</span>
          <span id="routeStatus" class="route-status">未绘制</span>
          <span class="collapse-icon">▼</span>
        </div>
        <div class="card-body">
          <div id="distanceInfo" class="distance-display">0.00 km</div>
          <div class="route-actions">
            <button id="undoBtn" class="btn-secondary">↩️ 回退</button>
            <button id="closeRouteBtn" class="btn-secondary">🔗 闭合</button>
            <button id="clearRoute" class="btn-secondary">🗑️ 清空</button>
            <button id="saveRouteBtn" class="btn-secondary">💾 保存</button>
            <button id="smoothBtn" class="btn-accent">✨ 平滑</button>
          </div>
          <div class="route-actions" style="margin-top:6px">
            <button id="exportGpxBtn" class="btn-secondary">🌐 导出 GPX</button>
            <button id="importGpxBtn" class="btn-secondary">📂 导入 GPX</button>
            <input type="file" id="gpxFileInput" accept=".gpx,.xml" style="display:none">
          </div>
          
          <div id="savedRoutesList" class="saved-routes"></div>
          
          <div class="lap-calc">
            <div class="lap-calc-label">
              <span>圈数</span>
              <span>目标距离 (km)</span>
            </div>
            <div class="form-row-2">
              <input type="number" id="lapCount" value="1" min="0.1" step="0.01" placeholder="圈数">
              <input type="number" id="targetDistance" value="5" min="0.1" step="0.1" placeholder="目标 km">
            </div>
            <button id="calculateLapsBtn" class="btn-small">按距离计算圈数</button>
          </div>
        </div>
      </div>

      <div class="card collapsible">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-icon">⚙️</span>
          <span>运动参数</span>
          <span class="collapse-icon">▼</span>
        </div>
        <div class="card-body">
          <div class="param-grid">
            <div class="param-item">
              <label>静息心率</label>
              <input type="number" id="hrRest" value="60" min="30" max="100">
            </div>
            <div class="param-item">
              <label>最大心率</label>
              <input type="number" id="hrMax" value="180" min="100" max="220">
            </div>
            <div class="param-item">
              <label>平均步频</label>
              <input type="number" id="avgCadence" value="170" min="120" max="210">
            </div>
            <div class="param-item">
              <label>体重 kg</label>
              <input type="number" id="weightInput" value="60" min="30" max="200">
            </div>
          </div>
          <div class="param-grid">
            <div class="param-item">
              <label>功率系数</label>
              <input type="number" id="powerFactor" value="1.3" min="0.5" max="3.0" step="0.1">
            </div>
            <div class="param-item">
              <label>GPS偏移</label>
              <input type="number" id="gpsDrift" value="0.1" min="0" max="1" step="0.01">
            </div>
          </div>
        </div>
      </div>

      <div class="card collapsible">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-icon">📤</span>
          <span>导出设置</span>
          <span class="collapse-icon">▼</span>
        </div>
        <div class="card-body">
          <div class="export-count">
            <label>导出份数</label>
            <input type="number" id="exportCount" value="1" min="1" max="10">
          </div>
          <div class="export-options">
            <p class="options-title">传感器数据</p>
            <div class="checkbox-grid">
              <label class="checkbox-label">
                <input type="checkbox" id="includeHeartRate" checked>
                <span class="checkbox-custom"></span>
                <span>心率</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="includePower" checked>
                <span class="checkbox-custom"></span>
                <span>功率</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="includeCadence" checked>
                <span class="checkbox-custom"></span>
                <span>步频</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="includeGaitData" checked>
                <span class="checkbox-custom"></span>
                <span>步态数据</span>
              </label>
            </div>
          </div>
          <div id="exportTimes" class="export-times"></div>
        </div>
      </div>

      <div class="action-buttons">
        <button id="generateFit" class="btn-generate">⚡ 生成 FIT 文件</button>
        <button id="previewBtn" class="btn-preview">📊 预览曲线</button>
        <button id="getLocationBtnMobile" class="btn-location" style="display: none;">📍 定位</button>
      </div>

      <div id="message" class="message"></div>

      <div class="preview-panel">
        <div class="preview-chart">
          <h3>配速 min/km</h3>
          <canvas id="paceChart"></canvas>
        </div>
        <div class="preview-chart">
          <h3>心率 bpm</h3>
          <canvas id="hrChart"></canvas>
        </div>
      </div>

      <div id="liveInfo" class="live-info"></div>
    </div>

    <div id="map"></div>
  </div>

  <div id="sponsorModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>赞赏支持</h3>
        <button class="modal-close" onclick="closeSponsorModal()">×</button>
      </div>
      <div class="modal-body">
        <p class="sponsor-tip">如果您觉得这个项目对您有帮助，欢迎赞赏支持</p>
        <div class="sponsor-image-container">
          <img id="sponsorImage" src="./sponsor.png" alt="赞助码" class="sponsor-image">
        </div>
        <div class="sponsor-actions">
          <a href="https://github.com/HOG-StarWatch/FitTool" target="_blank" rel="noopener noreferrer" class="btn-github">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            前往开源地址
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="generatingModal" class="modal">
    <div class="modal-content modal-small">
      <div class="generating-content">
        <div class="loading-spinner"></div>
        <p class="generating-text" id="generatingText">正在生成 FIT 文件...</p>
        <p class="generating-hint" id="generatingHint" style="display: none;"></p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="./main.js"></script>
</body>
</html>
